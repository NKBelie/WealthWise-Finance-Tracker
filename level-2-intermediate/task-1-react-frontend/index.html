<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="WealthWise - Smart Personal Finance Tracker. Manage your income, expenses, and budgets with our modern React application." />
    <meta name="keywords" content="finance, budget, expense tracker, personal finance, money management, react, vite" />
    <meta name="author" content="WealthWise Team - Codveda Internship" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />

    <meta property="twitter:card" content="summary_large_image" />

    <meta property="twitter:title" content="WealthWise - Smart Personal Finance Tracker" />
    <meta property="twitter:description" content="Take control of your finances with our comprehensive expense tracking and budget management platform built with React." />
    <meta property="twitter:image" content="/twitter-image.jpg" />

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Preconnect to fonts for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <title>WealthWise - Smart Personal Finance Tracker</title>

    <meta name="theme-color" content="#1f2937" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">

  <body>
    <!-- React Root Element -->
    <div id="root"></div>

      <div style="
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: system-ui, -apple-system, sans-serif;
        text-align: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px;
      ">
        <h1>WealthWise Finance Tracker</h1>
        <p>Please enable JavaScript to run this application.</p>

    <!-- Main Application Script -->
    <script type="module" src="/src/main.jsx"></script>
